<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0f1a" />
  <title>Offline - SF6 Shishou</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 24px;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 360px;
    }
    .icon {
      font-size: 72px;
      margin-bottom: 24px;
    }
    .title-ja {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .title-en {
      font-size: 16px;
      color: #8888aa;
      margin-bottom: 32px;
    }
    .retry-btn {
      display: inline-block;
      padding: 14px 36px;
      border: none;
      border-radius: 12px;
      background: #e94560;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry-btn:hover {
      background: #ff6b81;
    }
    .retry-btn:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#x1F94B;</div>
    <div class="title-ja">オフラインです</div>
    <div class="title-en">You are offline</div>
    <button class="retry-btn" onclick="location.reload()">再試行 / Retry</button>
  </div>
</body>
</html>
